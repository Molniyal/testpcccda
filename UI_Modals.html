<!-- Dialog Xác nhận -->
<div id="customDialog" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="text-align: center; max-width: 350px;">
        <h3 id="dialogTitle" style="margin-top:0; font-weight: 800;">Xác nhận</h3>
        <p id="dialogMessage" style="margin: 15px 0; color:#94a3b8; font-size:15px;"></p>
        <div style="display:flex; gap:10px; margin-top:25px;">
            <button id="dialogBtnOk" class="btn btn-primary" style="flex:1;">Đồng ý</button>
            <button class="btn"
                style="flex:1; background:#f1f5f9; color:var(--text-main); border: 1px solid var(--card-border);"
                onclick="closeDialog()">Hủy</button>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal-overlay">
    <div class="modal-content" style="text-align: center; max-width: 400px; padding: 45px;">
        <div
            style="background:linear-gradient(135deg, var(--primary), var(--secondary)); width:70px; height:70px; border-radius:24px; display:flex; align-items:center; justify-content:center; margin:0 auto 25px auto;">
            <i data-lucide="shield" style="color:white; width:35px; height:35px;"></i>
        </div>
        <h2 style="margin-bottom: 30px; font-weight: 800;">HỆ THỐNG PCCC ERP</h2>
        <form id="loginForm">
            <input type="text" id="maNvLogin" class="form-input" placeholder="Mã Nhân Viên" required
                style="margin-bottom: 15px;">
            <input type="password" id="passLogin" class="form-input" placeholder="Mật khẩu" required
                style="margin-bottom: 25px;">
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px;">ĐĂNG NHẬP</button>
        </form>
    </div>
</div>

<!-- Edit Log Modal -->
<div id="editLogModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h3 style="margin:0;">Báo Cáo: <span id="editMaTB" style="color:var(--primary);"></span></h3>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        <img id="editImage" class="report-image-preview" src=""
            style="width:100%; border-radius:12px; margin-bottom:15px;">
        <p style="font-size:12px;">Người KT: <b id="editNguoiKT"></b> | <span id="editTime"></span></p>
        <input type="hidden" id="editThoiGian">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <div style="flex:1"><label>Ngoại quan:</label><select id="editNq" class="form-input">
                    <option value="Đạt">Đạt</option>
                    <option value="Lỗi">Lỗi</option>
                </select></div>
            <div style="flex:1"><label>Áp suất:</label><select id="editAs" class="form-input">
                    <option value="Đạt">Đạt</option>
                    <option value="Lỗi">Lỗi</option>
                </select></div>
            <div style="flex:1"><label>Hạn SD:</label><select id="editHs" class="form-input">
                    <option value="Còn hạn">Còn hạn</option>
                    <option value="Hết hạn">Hết hạn</option>
                </select></div>
        </div>
        <label>Ghi chú:</label><textarea id="editGc" class="form-input" rows="3"></textarea>
        <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="submitEditLog()">Lưu Thay
            Đổi</button>
    </div>
</div>

<!-- Edit Location Modal -->
<div id="editLocModal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="max-width:350px;">
        <h3 style="margin-top:0;">Sửa: <span id="editLocMaTB" style="color:var(--primary);"></span></h3>
        <label>Xưởng:</label><input type="text" id="editLocXuong" class="form-input">
        <label>Khu Vực:</label><input type="text" id="editLocKhuVuc" class="form-input">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-primary" style="flex:1;" onclick="submitEditLoc()">Lưu</button>
            <button class="btn" style="flex:1; background:#e2e8f0;"
                onclick="document.getElementById('editLocModal').style.display='none'">Hủy</button>
        </div>
    </div>
</div>

<!-- Add Location Modal -->
<div id="addLocModal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="max-width:350px;">
        <h3 style="margin-top:0;">Thêm Vị Trí Mới</h3>
        <input type="text" id="addMaTB" class="form-input" placeholder="Mã Thiết Bị" style="margin-bottom:10px;">
        <input type="text" id="addXuong" class="form-input" placeholder="Xưởng" style="margin-bottom:10px;">
        <input type="text" id="addKhuVuc" class="form-input" placeholder="Khu Vực" style="margin-bottom:10px;">
        <input type="email" id="addEmail" class="form-input" placeholder="Email Quản Lý">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-success" style="flex:1;" onclick="submitAddLoc()">Thêm Mới</button>
            <button class="btn" style="flex:1; background:#f1f5f9;"
                onclick="document.getElementById('addLocModal').style.display='none'">Hủy</button>
        </div>
    </div>
</div>

<!-- Email Dialog -->
<div id="emailDialog" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="max-width: 500px;">
        <h3 style="margin-top:0;">Gửi Báo Cáo Email</h3>
        <label>Mẫu Email:</label><select id="emailTemplateSelect" class="form-input"
            onchange="loadTemplateToEmailForm()"></select>
        <label>TO:</label><input type="text" id="emailTo" class="form-input">
        <label>CC:</label><input type="text" id="emailCc" class="form-input">
        <input type="hidden" id="emailType">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-success" style="flex:1;" onclick="executeSendEmail()">Gửi Ngay</button>
            <button class="btn" style="flex:1; background:#e2e8f0;"
                onclick="document.getElementById('emailDialog').style.display='none'">Hủy</button>
        </div>
    </div>
</div>
