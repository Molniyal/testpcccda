<style>
    /* ========== RED & WHITE PROFESSIONAL PCCC THEME ========== */
    :root {
        --primary: #e11d48;
        /* Fire Red */
        --primary-hover: #be123c;
        --primary-glow: rgba(225, 29, 72, 0.2);
        --secondary: #475569;
        --accent: #f59e0b;
        --success: #10b981;
        --danger: #dc2626;
        --sidebar-width: 280px;
        --sidebar-collapsed: 90px;
        --glass-bg: rgba(255, 255, 255, 0.9);
        --glass-border: rgba(225, 29, 72, 0.15);
        --text-main: #0f172a;
        --text-muted: #64748b;
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        --card-border: #e2e8f0;
        --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    body {
        font-family: 'Outfit', 'Inter', sans-serif;
        background: #f8fafc;
        background-image: var(--bg-gradient);
        background-attachment: fixed;
        color: var(--text-main);
        margin: 0;
        padding: 0;
        display: flex;
        overflow-x: hidden;
        min-height: 100vh;
    }

    .blob {
        position: fixed;
        width: 600px;
        height: 600px;
        background: rgba(225, 29, 72, 0.05);
        filter: blur(100px);
        border-radius: 50%;
        z-index: -1;
        animation: move 25s infinite alternate;
    }

    .blob-2 {
        top: 40%;
        left: 50%;
        background: rgba(225, 29, 72, 0.03);
        animation-delay: -5s;
    }

    @keyframes move {
        from {
            transform: translate(-10%, -10%);
        }

        to {
            transform: translate(10%, 15%);
        }
    }

    .sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        background: #ffffff;
        border-right: 1px solid #e2e8f0;
        padding: 30px 20px;
        box-sizing: border-box;
        position: fixed;
        left: 0;
        top: 0;
        z-index: 1001;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02);
    }

    .sidebar h2 {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 40px;
        font-size: 20px;
        font-weight: 800;
        color: var(--primary);
    }

    .sidebar-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        color: var(--text-muted);
        cursor: pointer;
        border-radius: 12px;
        margin-bottom: 8px;
        transition: all 0.2s ease;
        font-weight: 600;
    }

    .sidebar-item:hover {
        background: #fff1f2;
        color: var(--primary);
    }

    .sidebar-item.active {
        background: var(--primary);
        color: white;
        box-shadow: 0 8px 15px rgba(225, 29, 72, 0.2);
    }

    .sidebar-item i {
        color: var(--primary);
        opacity: 0.8;
    }

    .sidebar-item.active i {
        color: white;
        opacity: 1;
    }

    .pagination-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 15px;
        padding: 10px;
        background: #f8fafc;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
    }

    .page-btn {
        background: white;
        border: 1px solid var(--card-border);
        color: var(--text-main);
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: all 0.2s;
    }

    .page-btn:hover:not(:disabled) {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
    }

    .page-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .page-num {
        font-size: 14px;
        font-weight: 700;
        color: var(--primary);
    }

    .main-content {
        padding: 40px;
        box-sizing: border-box;
        flex: 1;
        height: 100vh;
        overflow-y: auto;
        scroll-behavior: smooth;
    }

    .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
        background: #ffffff;
        padding: 20px 30px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
    }

    .view-section {
        display: none;
        animation: slideUp 0.4s ease-out;
    }

    .view-section.active {
        display: block;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(15px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 25px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: #ffffff;
        padding: 25px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
    }

    .stat-card:hover {
        transform: translateY(-5px);
        border-color: var(--primary);
        box-shadow: 0 10px 20px rgba(225, 29, 72, 0.1);
    }

    .stat-card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--primary);
        opacity: 0.1;
    }

    .stat-label {
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .stat-value {
        font-size: 32px;
        font-weight: 800;
        color: var(--text-main);
        margin: 0;
    }

    .content-card {
        background: #ffffff;
        padding: 30px;
        border-radius: 24px;
        margin-bottom: 30px;
        border: 1px solid var(--card-border);
        box-shadow: var(--card-shadow);
    }

    .table-responsive {
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        overflow: hidden;
        background: #fff;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
    }

    th {
        background: #f8fafc;
        color: var(--text-muted);
        font-weight: 700;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.08em;
        padding: 15px 20px;
        text-align: left;
        border-bottom: 1px solid #e2e8f0;
    }

    td {
        border-bottom: 1px solid #f1f5f9;
        padding: 15px 20px;
        color: var(--text-main);
        font-size: 14px;
        vertical-align: middle;
    }

    tr:hover td {
        background: #fff9f9;
    }

    .badge {
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
    }

    .badge-ok {
        background: #f0fdf4;
        color: #166534;
        border: 1px solid #bbfcce;
    }

    .badge-err {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        color: white;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
        font-size: 14px;
    }

    .btn-primary {
        background: var(--primary);
        box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2);
    }

    .btn-danger {
        background: #dc2626;
    }

    .btn-success {
        background: #10b981;
    }

    .form-input {
        width: 100%;
        padding: 12px 16px;
        background: #fbfcfd;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        color: var(--text-main);
        transition: border-color 0.2s;
        font-family: inherit;
    }

    .form-input:focus {
        border-color: var(--primary);
        outline: none;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.08);
    }

    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
    }

    .modal-content {
        background: #ffffff;
        padding: 35px;
        border-radius: 24px;
        width: 90%;
        max-width: 500px;
        border: 1px solid #f1f5f9;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes popIn {
        from {
            transform: scale(0.95);
            opacity: 0;
        }

        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    @media print {
        body>* {
            display: none !important;
        }

        #printArea {
            display: block !important;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: white !important;
        }

        .ticket {
            display: inline-block;
            width: 180px;
            text-align: center;
            margin: 10px;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            page-break-inside: avoid;
        }

        .ticket img {
            width: 140px;
            height: 140px;
        }

        .ticket h3 {
            margin: 10px 0 5px 0;
            font-weight: 800;
            font-size: 18px;
        }

        .ticket p {
            margin: 0;
            font-size: 12px;
            color: #64748b;
        }
    }
</style>
